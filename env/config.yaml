# ===========================================
# プロジェクト固有設定
# 環境変数で個別にオーバーライド可能
# ローカル秘密情報は env/secret.yaml、共有・本番クレデンシャルは Doppler で管理 (doppler.yaml)
# ===========================================

# --- アプリケーション ---
projectName: kurosawa-ai-consulting-site
appEnv: local

# --- Supabase（非機密の公開 URL のみここに記載。キーは secret.yaml / Doppler）---
supabase:
  url: https://ftimimljrflfboopsqgm.supabase.co

# --- AI 制限 ---
ai:
  maxQueryLength: 200      # Edge Function に渡す相談文の最大文字数
  maxCandidates: 15        # AI 相談に渡す候補・補助情報の最大数
  dailyLimit: 50           # 1日あたりのAI機能利用上限（ブラウザ単位）

# --- Cloudflare Pages ---
deploy:
  distDir: app/dist
  pagesUrl: https://kurosawa-workbench.pages.dev
  latestDeployment: https://kurosawa-workbench.pages.dev
